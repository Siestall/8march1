<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта, Даша!</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
background:black;
}

/* видео фон */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

.video-bg iframe{
width:100vw;
height:100vh;
pointer-events:none;
}

/* затемнение */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
max-width:600px;
animation:fadeIn 2s ease;
}

h1{
font-size:42px;
}

p{
font-size:20px;
line-height:1.6;
}

button{
margin-top:25px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:20px;
background:white;
color:#ff4f8b;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.hidden{
display:none;
margin-top:20px;
font-size:22px;
}

/* цветы */

.flower{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}

/* сердечки */

.heart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:heartFloat 1s forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

@keyframes heartFloat{
0%{transform:scale(1);opacity:1}
100%{transform:translateY(-80px) scale(1.5);opacity:0}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="video-bg">
<iframe
id="bgvideo"
src="https://www.youtube.com/embed/rrngM9DmDfk?controls=0&loop=1&playlist=rrngM9DmDfk"
frameborder="0"
allow="autoplay"
></iframe>
</div>

<div class="overlay"></div>

<div class="card">

<h1>С 8 Марта, Даша! 🌸</h1>

<p>
Даша, ты самая прекрасная, нежная и удивительная девушка.  
Пусть твоя улыбка всегда освещает этот мир,  
а каждый день приносит счастье и радость.
</p>

<button onclick="showMessage()">Нажми сюда ❤️</button>

<div id="msg" class="hidden">
Я люблю тебя, Даша 💖
</div>

</div>

<script>

/* запуск видео при первом клике */

document.body.addEventListener("click", function(){

document.getElementById("bgvideo").src =
"https://www.youtube.com/embed/rrngM9DmDfk?autoplay=1&controls=0&loop=1&playlist=rrngM9DmDfk";

},{once:true});

/* показать сообщение */

function showMessage(){
document.getElementById('msg').style.display='block';
}

/* падающие цветы */

function createFlower(){

const flower=document.createElement('div');
flower.className='flower';
flower.innerHTML='🌸';

flower.style.left=Math.random()*100+'vw';
flower.style.animationDuration=(3+Math.random()*5)+'s';

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},8000);

}

setInterval(createFlower,500);

/* сердечки при клике */

document.addEventListener('click',function(e){

const heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='💖';

heart.style.left=e.clientX+'px';
heart.style.top=e.clientY+'px';

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

});

</script>

</body>
</html>
